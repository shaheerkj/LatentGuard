# LatentGuard custom baseline rules — minimal SQLi / XSS / path-traversal
# coverage so the FYP-I demo can show blocking without depending on the
# full OWASP CRS bundle. Drop CRS into this directory to extend coverage.
#
# Rule IDs 1000000-1099999 are reserved for the LatentGuard baseline.
# AI-generated rules from M9 use 2000000+ to avoid collision with CRS (900k).

# --- SQL Injection -----------------------------------------------------------

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(?:union[\s/*]+select|select.+from\s+information_schema|or\s+1=1\b)" \
    "id:1000001,phase:2,deny,status:403,severity:'CRITICAL',\
     msg:'SQLi: classic UNION/SELECT/1=1 pattern',\
     tag:'attack-sqli',tag:'latentguard/baseline'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i);[\s]*(?:drop|truncate|alter|delete)[\s]+(?:table|database)" \
    "id:1000002,phase:2,deny,status:403,severity:'CRITICAL',\
     msg:'SQLi: stacked DDL/DML',\
     tag:'attack-sqli',tag:'latentguard/baseline'"

# --- Cross-Site Scripting ----------------------------------------------------

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)<script[^>]*>" \
    "id:1000010,phase:2,deny,status:403,severity:'CRITICAL',\
     msg:'XSS: script tag in request',\
     tag:'attack-xss',tag:'latentguard/baseline'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)\bjavascript:\s*[a-z(]" \
    "id:1000011,phase:2,deny,status:403,severity:'CRITICAL',\
     msg:'XSS: javascript: pseudo-protocol',\
     tag:'attack-xss',tag:'latentguard/baseline'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)\bon(?:click|load|error|mouseover)\s*=" \
    "id:1000012,phase:2,deny,status:403,severity:'ERROR',\
     msg:'XSS: inline event handler',\
     tag:'attack-xss',tag:'latentguard/baseline'"

# --- Path Traversal ----------------------------------------------------------

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?:\.\./|\.\.\\\\){2,}" \
    "id:1000020,phase:2,deny,status:403,severity:'ERROR',\
     msg:'Path traversal sequence',\
     tag:'attack-lfi',tag:'latentguard/baseline'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)/etc/(?:passwd|shadow|hosts)\b" \
    "id:1000021,phase:2,deny,status:403,severity:'ERROR',\
     msg:'Sensitive file access attempt',\
     tag:'attack-lfi',tag:'latentguard/baseline'"

# --- Command Injection -------------------------------------------------------

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(?:;|\||&&|\$\(|\`)\s*(?:cat|ls|whoami|id|uname|nc|wget|curl)\b" \
    "id:1000030,phase:2,deny,status:403,severity:'CRITICAL',\
     msg:'Command injection: shell metachar + binary',\
     tag:'attack-rce',tag:'latentguard/baseline'"
