# LatentGuard baseline ModSecurity (SecLang) configuration.
#
# These directives establish detection-friendly defaults so that custom rules
# below behave predictably. They run BEFORE OWASP CRS (which gets dropped into
# this directory by scripts/fetch-crs.sh) so that CRS variables are honoured.

SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 1048576
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off
SecAuditEngine Off

# Note: SecDefaultAction is intentionally NOT set here. OWASP CRS sets it in
# REQUEST-901-INITIALIZATION.conf, and Coraza rejects redefinition for the
# same phase. Our baseline rules (10-latentguard-baseline.conf) carry their
# own explicit "deny,status:403" actions so they don't depend on the default.
