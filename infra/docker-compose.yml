services:
  mongo:
    image: mongo:6.0
    container_name: latentguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: latentguard
    volumes:
      - mongo-data:/data/db
    networks:
      - latentguard

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: latentguard-dvwa
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - latentguard

  ml:
    build:
      context: ../ml
      dockerfile: Dockerfile
    container_name: latentguard-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: latentguard
      CSIC_DIR: /app/csic_raw
    volumes:
      - ../ml/models:/app/models      # trained artifacts persist & are host-editable
      - ../datasets/raw:/app/csic_raw # cached CSIC downloads
    depends_on:
      - mongo
    networks:
      - latentguard

  proxy:
    build:
      context: ../proxy
      dockerfile: Dockerfile
    container_name: latentguard-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      PROXY_LISTEN: ":8080"
      PROXY_TLS_LISTEN: ":8443"
      # PROXY_TLS_CERT / PROXY_TLS_KEY left unset -> proxy auto-generates a
      # self-signed cert at startup (24h validity, localhost SAN). For prod,
      # mount a real cert into /etc/certs and set the two env vars.
      PROXY_UPSTREAM: "http://dvwa:80"
      ML_URL: "http://ml:8000"
      ML_TIMEOUT_MS: "1000"
      # FYP-I 30 % submission scope: M1+M2+M3+M7 only.
      # ML layer (M4+M5+M6) is implemented on this branch but bypassed; see
      # main branch for the Phase A integrated build.
      ML_DISABLED: "true"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "latentguard"
      CORAZA_RULES_DIR: "/etc/coraza/rules"
    depends_on:
      - mongo
      - ml
      - dvwa
    networks:
      - latentguard

  dashboard:
    image: nginx:1.26-alpine
    container_name: latentguard-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    networks:
      - latentguard

volumes:
  mongo-data:

networks:
  latentguard:
    driver: bridge
