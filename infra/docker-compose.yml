services:
  mongo:
    image: mongo:6.0
    container_name: latentguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: latentguard
    volumes:
      - mongo-data:/data/db
    networks:
      - latentguard

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: latentguard-dvwa
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - latentguard

  ml:
    build:
      context: ../ml
      dockerfile: Dockerfile
    container_name: latentguard-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: latentguard
    depends_on:
      - mongo
    networks:
      - latentguard

  proxy:
    build:
      context: ../proxy
      dockerfile: Dockerfile
    container_name: latentguard-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PROXY_LISTEN: ":8080"
      PROXY_UPSTREAM: "http://dvwa:80"
      ML_URL: "http://ml:8000"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "latentguard"
      CORAZA_RULES_DIR: "/etc/coraza/rules"
    depends_on:
      - mongo
      - ml
      - dvwa
    networks:
      - latentguard

  dashboard:
    image: nginx:1.26-alpine
    container_name: latentguard-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    networks:
      - latentguard

volumes:
  mongo-data:

networks:
  latentguard:
    driver: bridge
